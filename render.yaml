services:
  - type: web
    name: kichefu-chefu-store
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "kichefu-chefu-store.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://kichefu-chefu-store.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: kichefu-chefu-db
          property: connectionString

databases:
  - name: kichefu-chefu-db
    plan: free
