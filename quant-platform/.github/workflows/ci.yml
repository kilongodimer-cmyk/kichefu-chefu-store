name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/backend/pyproject.toml') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app
      - name: Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/services/backend
        run: pytest -q || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend/terminal
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/frontend/terminal/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
