version: "3.9"

services:
  backend:
    build:
      context: ../services/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - env/backend.env
    volumes:
      - ../services/backend:/app
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - env/frontend.env
    volumes:
      - ../services/frontend/terminal:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - env/postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
