<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | KICHEFU-CHEFU STORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --black:#111111; --orange:#ff6b00; --white:#ffffff; --line:rgba(255,255,255,.12); --muted:rgba(255,255,255,.72); --brand-watermark:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='200'%20height='240'%20viewBox='0%200%20200%20240'%3E%3Cpath%20fill='%23ffffff'%20d='M42%2072%20V56%20L60%2028%20L100%2058%20L140%2028%20L158%2056%20V72%20Z'/%3E%3Ccircle%20cx='60'%20cy='28'%20r='6'%20fill='%23ffffff'/%3E%3Ccircle%20cx='100'%20cy='22'%20r='6'%20fill='%23ffffff'/%3E%3Ccircle%20cx='140'%20cy='28'%20r='6'%20fill='%23ffffff'/%3E%3Ctext%20x='100'%20y='126'%20text-anchor='middle'%20font-family='Montserrat,%20Poppins,%20Arial,%20sans-serif'%20font-size='20'%20font-weight='700'%20fill='%23ffffff'%3EKICHEFU-CHEFU%3C/text%3E%3Ctext%20x='100'%20y='154'%20text-anchor='middle'%20font-family='Montserrat,%20Poppins,%20Arial,%20sans-serif'%20font-size='12'%20font-weight='300'%20letter-spacing='7'%20fill='%23ffffff'%3ESTORE%3C/text%3E%3C/svg%3E"); }
      * { box-sizing: border-box; }
      body { margin:0; font-family:"Inter",system-ui,sans-serif; color:var(--white); background:var(--black); position:relative; isolation:isolate; }
      body::before { content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.05; background-image:var(--brand-watermark); background-repeat:repeat; background-size:200px auto; background-position:0 0; background-attachment:fixed; }
      .container { width:min(980px,92vw); margin:0 auto; padding:30px 0; }
      .top { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
      a.btn { text-decoration:none; border:1px solid var(--line); border-radius:999px; color:var(--white); padding:9px 13px; }
      a.btn.main { background:var(--orange); border-color:transparent; color:#111; font-weight:700; }
      .list { margin-top:16px; display:grid; gap:10px; }
      .item { border:1px solid var(--line); border-radius:12px; background:#171717; padding:12px; }
      .item.unread { border-color:rgba(255,107,0,.45); }
      .meta { color:var(--muted); font-size:.86rem; margin-top:6px; }
      .item a { color:#ffd4b4; }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="top">
        <h1>Notifications</h1>
        <div>
          <a class="btn" href="/">Accueil</a>
          <a class="btn main" href="?mark_read=1">Tout marquer lu</a>
        </div>
      </div>
      <div class="list">
        {% for item in notifications %}
          <article class="item{% if not item.is_read %} unread{% endif %}">
            <strong>{{ item.title }}</strong>
            <p>{{ item.message }}</p>
            <div class="meta">
              {{ item.get_notification_type_display }} - {{ item.created_at }}
              {% if item.content_object %}- <a href="{{ item.content_object.get_absolute_url }}">Voir annonce</a>{% endif %}
            </div>
          </article>
        {% empty %}
          <p>Aucune notification pour le moment.</p>
        {% endfor %}
      </div>
    </main>
    <script>
      (function () {
        const canUseCustomCursor = window.matchMedia("(min-width: 981px) and (hover: hover) and (pointer: fine)").matches;
        if (!canUseCustomCursor) {
          return;
        }

        const style = document.createElement("style");
        style.textContent = "html,body,a,button,input,select,textarea{cursor:none !important}.cursor-dot,.cursor-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:240;mix-blend-mode:difference}.cursor-dot{width:8px;height:8px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}.cursor-ring{width:34px;height:34px;border:1px solid #fff;border-radius:50%;transform:translate(-50%,-50%);transition:width .2s ease,height .2s ease,border-color .2s ease}.cursor-ring.is-hover{width:56px;height:56px;border-color:#ff6b00}";
        document.head.appendChild(style);
        const dot = document.createElement("div");
        dot.className = "cursor-dot";
        const ring = document.createElement("div");
        ring.className = "cursor-ring";
        document.body.appendChild(dot);
        document.body.appendChild(ring);
        let mouseX = 0;
        let mouseY = 0;
        let ringX = 0;
        let ringY = 0;
        function loop() {
          ringX += (mouseX - ringX) * 0.22;
          ringY += (mouseY - ringY) * 0.22;
          dot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
          ring.style.transform = `translate(${ringX}px, ${ringY}px) translate(-50%, -50%)`;
          requestAnimationFrame(loop);
        }
        window.addEventListener("mousemove", (event) => {
          mouseX = event.clientX;
          mouseY = event.clientY;
        });
        document.querySelectorAll("a,button,input,select,textarea").forEach((item) => {
          item.addEventListener("mouseenter", () => ring.classList.add("is-hover"));
          item.addEventListener("mouseleave", () => ring.classList.remove("is-hover"));
        });
        loop();
      })();
    </script>
  </body>
</html>
