<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion | KICHEFU-CHEFU STORE</title>
    <style>
      :root {
        --bg: #0f1216;
        --panel: #171b22;
        --line: #2b313d;
        --text: #f7f8fa;
        --muted: #b6bdc8;
        --gold: #d6b96f;
        --brand-watermark: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='200'%20height='240'%20viewBox='0%200%20200%20240'%3E%3Cpath%20fill='%23ffffff'%20d='M42%2072%20V56%20L60%2028%20L100%2058%20L140%2028%20L158%2056%20V72%20Z'/%3E%3Ccircle%20cx='60'%20cy='28'%20r='6'%20fill='%23ffffff'/%3E%3Ccircle%20cx='100'%20cy='22'%20r='6'%20fill='%23ffffff'/%3E%3Ccircle%20cx='140'%20cy='28'%20r='6'%20fill='%23ffffff'/%3E%3Ctext%20x='100'%20y='126'%20text-anchor='middle'%20font-family='Montserrat,%20Poppins,%20Arial,%20sans-serif'%20font-size='20'%20font-weight='700'%20fill='%23ffffff'%3EKICHEFU-CHEFU%3C/text%3E%3Ctext%20x='100'%20y='154'%20text-anchor='middle'%20font-family='Montserrat,%20Poppins,%20Arial,%20sans-serif'%20font-size='12'%20font-weight='300'%20letter-spacing='7'%20fill='%23ffffff'%3ESTORE%3C/text%3E%3C/svg%3E");
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        position: relative;
        isolation: isolate;
        background: radial-gradient(circle at top right, #1d2430 0%, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.05;
        background-image: var(--brand-watermark);
        background-repeat: repeat;
        background-size: 200px auto;
        background-position: 0 0;
        background-attachment: fixed;
      }
      html, body { cursor: none !important; }
      a, button, input { cursor: none !important; }
      .custom-cursor,
      .custom-cursor a,
      .custom-cursor button,
      .custom-cursor input { cursor: none !important; }
      .cursor-dot,
      .cursor-ring {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 220;
        mix-blend-mode: difference;
        opacity: 0;
      }
      .custom-cursor .cursor-dot,
      .custom-cursor .cursor-ring { opacity: 1; }
      .cursor-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fff;
        transform: translate(-50%, -50%);
      }
      .cursor-ring {
        width: 34px;
        height: 34px;
        border: 1px solid #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.2s ease, height 0.2s ease, border-color 0.2s ease;
      }
      .cursor-ring.is-hover { width: 56px; height: 56px; border-color: var(--gold); }
      .card {
        width: min(440px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
      }
      h1 { margin: 0 0 10px; font-size: 1.5rem; }
      p { margin: 0 0 18px; color: var(--muted); }
      label { display: block; margin: 12px 0 6px; font-size: 0.92rem; }
      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #0e1218;
        color: var(--text);
        border-radius: 10px;
        padding: 11px 12px;
      }
      .errorlist {
        margin: 0 0 10px;
        padding: 10px 12px;
        list-style: none;
        border: 1px solid #69393e;
        border-radius: 10px;
        background: #311f23;
        color: #ffc5cd;
      }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, #c9a34a, var(--gold));
        color: #111;
        font-weight: 700;
        padding: 12px;
        margin-top: 14px;
        cursor: pointer;
      }
      .links {
        margin-top: 14px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .char { display: inline-block; }
      a { color: var(--gold); text-decoration: none; }
      @media (max-width: 980px) {
        html, body, a, button, input { cursor: none !important; }
        .cursor-dot, .cursor-ring { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>
    <main class="card">
      <h1 class="split-text">Connexion obligatoire</h1>
      <p class="fade-item">Vous devez creer un compte ou vous connecter avant d'acceder au marketplace.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {{ field.errors }}
        {% endfor %}
        <input type="hidden" name="next" value="{{ next }}" />
        <button class="btn magnetic fade-item" type="submit">Se connecter</button>
      </form>
      <div class="links fade-item">
        <a class="magnetic" href="/inscription/{% if next %}?next={{ next }}{% endif %}">Espace visiteurs: creer un compte</a>
        <a class="magnetic" href="/agent/connexion/">Espace agents</a>
      </div>
      <div class="links fade-item">
        <a class="magnetic" href="/admin/">Espace administrateur</a>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
      (function () {
        const dot = document.getElementById("cursor-dot");
        const ring = document.getElementById("cursor-ring");
        const cursorMedia = window.matchMedia("(min-width: 981px) and (hover: hover) and (pointer: fine)");
        const setCursorMode = () => {
          document.documentElement.classList.toggle("custom-cursor", Boolean(dot && ring && cursorMedia.matches));
        };
        setCursorMode();
        if (cursorMedia.addEventListener) {
          cursorMedia.addEventListener("change", setCursorMode);
        } else if (cursorMedia.addListener) {
          cursorMedia.addListener(setCursorMode);
        }
        if (dot && ring && true) {
          window.addEventListener("mousemove", (event) => {
            gsap.to(dot, { x: event.clientX, y: event.clientY, duration: 0.08 });
            gsap.to(ring, { x: event.clientX, y: event.clientY, duration: 0.2 });
          });
          document.querySelectorAll("a, button, input, .magnetic").forEach((item) => {
            item.addEventListener("mouseenter", () => ring.classList.add("is-hover"));
            item.addEventListener("mouseleave", () => ring.classList.remove("is-hover"));
          });
        }

        document.querySelectorAll(".split-text").forEach((block) => {
          const chars = block.textContent.split("").map((char) => `<span class=\"char\">${char === " " ? "&nbsp;" : char}</span>`).join("");
          block.innerHTML = chars;
        });

        gsap.from(".split-text .char", { yPercent: 120, opacity: 0, stagger: 0.018, duration: 0.7, ease: "power3.out" });
        gsap.from(".fade-item", { y: 20, opacity: 0, duration: 0.7, stagger: 0.08, ease: "power3.out" });

        document.querySelectorAll(".magnetic").forEach((item) => {
          item.addEventListener("mousemove", (event) => {
            const rect = item.getBoundingClientRect();
            const x = event.clientX - (rect.left + rect.width / 2);
            const y = event.clientY - (rect.top + rect.height / 2);
            gsap.to(item, { x: x * 0.12, y: y * 0.12, duration: 0.2, ease: "power2.out" });
          });
          item.addEventListener("mouseleave", () => gsap.to(item, { x: 0, y: 0, duration: 0.25, ease: "power2.out" }));
        });
      })();
    </script>
  </body>
</html>
